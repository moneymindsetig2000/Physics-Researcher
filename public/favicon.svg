<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .atom-ellipse {
      fill: none;
      stroke: #020204;
      stroke-width: 3.5;
    }
    .atom-nucleus {
      fill: #020204;
    }
    @media (prefers-color-scheme: dark) {
      .atom-ellipse {
        stroke: #ffffff;
      }
      .atom-nucleus {
        fill: #ffffff;
      }
    }
  </style>
  <ellipse class="atom-ellipse" cx="50" cy="50" rx="38" ry="12" transform="rotate(30, 50, 50)" />
  <ellipse class="atom-ellipse" cx="50" cy="50" rx="38" ry="12" transform="rotate(90, 50, 50)" />
  <ellipse class="atom-ellipse" cx="50" cy="50" rx="38" ry="12" transform="rotate(150, 50, 50)" />
  <circle class="atom-nucleus" cx="50" cy="50" r="7" />
</svg>